<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Fantasy League Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        f1red: '#E10600',
                        asphalt: '#15151E',
                        carbon: '#1F1F27',
                        gold: '#FFD700',
                        silver: '#C0C0C0',
                        bronze: '#CD7F32'
                    },
                    fontFamily: {
                        racing: ['"Russo One"', 'sans-serif'],
                        body: ['"Titillium Web"', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #15151E; }
        ::-webkit-scrollbar-thumb { background: #E10600; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff1e15; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .driver-row:hover { background-color: rgba(255, 255, 255, 0.05); }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tab-btn.active { border-bottom-color: #E10600; color: white; }
        .d3-tooltip {
            position: absolute; text-align: center; padding: 8px;
            font: 12px 'Titillium Web', sans-serif; background: #1F1F27; color: white;
            border: 1px solid #374151; border-radius: 4px; pointer-events: none;
            opacity: 0; transition: opacity 0.2s; z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(21, 21, 30, 0.9); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; color: white; font-family: 'Russo One', sans-serif;
        }
        .loader {
            border: 4px solid #1F1F27; border-top: 4px solid #E10600;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .player-avatar {
            border-radius: 9999px;
            object-fit: cover;
            object-position: center 22%;
            flex-shrink: 0;
        }
        .f1-logo { height: 3rem; width: auto; }
        @media (min-width: 768px) { .f1-logo { height: 4.5rem; } }
    </style>
</head>
<body class="bg-asphalt text-white font-body min-h-screen p-4 md:p-8">

    <div id="loading-overlay">
        <div class="loader"></div>
        <h2 class="text-2xl tracking-wider">CONNECTING TO GRID...</h2>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="flex items-center justify-between border-b-4 border-f1red pb-4 mb-8">
            <div class="flex items-center gap-4">
                <img src="photos/f1.png" alt="F1" class="f1-logo">
                <div>
                    <h1 class="text-2xl md:text-4xl font-racing tracking-wider uppercase text-white mt-2">Fantasy Tracker</h1>
                    <p class="text-gray-400 text-sm md:text-base font-semibold uppercase tracking-widest">4-Player Dashboard</p>
                </div>
            </div>
            <div id="sync-status" class="text-right text-xs uppercase tracking-widest text-gray-500">
                <span id="sync-dot" class="inline-block w-2 h-2 rounded-full bg-gray-600 mr-1"></span>
                <span id="sync-label">Connecting...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10">
            <div class="lg:col-span-4 bg-carbon rounded-xl shadow-2xl border border-gray-800 p-6 flex flex-col">
                <h2 class="text-xl font-racing text-white uppercase border-b-2 border-gray-700 pb-2 mb-4">
                    <span class="text-f1red">Fantasy</span> Standings
                </h2>
                <div id="leaderboard-container" class="flex-1 flex flex-col justify-center space-y-4"></div>
            </div>

            <div class="lg:col-span-3 bg-carbon rounded-xl shadow-2xl border border-gray-800 p-6 flex flex-col items-center">
                <h2 class="text-xl font-racing text-white uppercase border-b-2 border-gray-700 pb-2 mb-4 w-full text-left">
                    <span class="text-f1red">Points</span> Share
                </h2>
                <div id="pie-chart-container" class="relative w-full flex justify-center items-center mt-2"></div>
            </div>

            <div class="lg:col-span-5 bg-carbon rounded-xl shadow-2xl border border-gray-800 p-6 flex flex-col items-center relative">
                <h2 class="text-xl font-racing text-white uppercase border-b-2 border-gray-700 pb-2 mb-4 w-full text-left">
                    <span class="text-f1red">Championship</span> Battle
                </h2>
                <div id="line-chart-container" class="relative w-full h-full min-h-[200px] mt-2"></div>
                <div id="chart-tooltip" class="d3-tooltip"></div>
            </div>
        </div>

        <div class="flex space-x-2 md:space-x-8 border-b-2 border-gray-800 mb-6 px-2">
            <button id="btn-tab-predictions" class="tab-btn active pb-3 px-4 text-sm md:text-lg font-racing uppercase tracking-wider text-gray-500 border-b-4 border-transparent hover:text-gray-300 transition-colors">
                Podium Predictions
            </button>
            <button id="btn-tab-fantasy" class="tab-btn pb-3 px-4 text-sm md:text-lg font-racing uppercase tracking-wider text-gray-500 border-b-4 border-transparent hover:text-gray-300 transition-colors flex items-center gap-2">
                Fantasy League <span class="bg-f1red text-white text-[10px] px-2 py-0.5 rounded-full">POINTS</span>
            </button>
        </div>

        <div id="league-container" class="flex flex-col gap-8 w-full overflow-hidden"></div>
    </div>

    <script src="config.js" onerror="window.APP_CONFIG=window.APP_CONFIG||{}"></script>
    <script type="module">
        import { createSyncManager } from "./js/sync.js";

        const TRACK_COUNT = 14;
        const MANAGER_COUNT = 4;

        window.f1State = {
            tracks: ['AUT', 'GBR', 'HUN', 'BEL', 'NED', 'ITA', 'AZE', 'SIN', 'USA', 'MEX', 'BRA', 'LVG', 'QAT', 'ABU'],
            predictions: [
                { id: 'p1', name: 'Position 1', type: 'driver' },
                { id: 'p2', name: 'Position 2', type: 'driver' },
                { id: 'p3', name: 'Position 3', type: 'driver' }
            ],
            fantasy: [
                { id: 'team', name: 'Top Team', type: 'team' },
                { id: 'fd1', name: 'Predicted Driver 1', type: 'driver' },
                { id: 'fd2', name: 'Predicted Driver 2', type: 'driver' }
            ],
            drivers: [
                "Alex Albon", "Andrea Kimi Antonelli", "Arvid Lindblad", "Carlos Sainz Jr.",
                "Charles Leclerc", "Esteban Ocon", "Fernando Alonso", "Franco Colapinto",
                "Gabriel Bortoleto", "George Russell", "Isack Hadjar", "Lance Stroll",
                "Lando Norris", "Lewis Hamilton", "Liam Lawson", "Max Verstappen",
                "Nico Hülkenberg", "Oliver Bearman", "Oscar Piastri", "Pierre Gasly",
                "Sergio Pérez", "Valtteri Bottas"
            ],
            teams: [
                "Alpine", "Aston Martin", "Audi", "Cadillac", "Ferrari", "Haas",
                "McLaren", "Mercedes", "Racing Bulls", "Red Bull", "Williams"
            ],
            managers: [
                { id: 0, name: 'Atharv', color: '#E10600', photo: 'photos/atharv.jpeg', photoPos: 'center 18%' },
                { id: 1, name: 'Rohan', color: '#FF8700', photo: 'photos/rohan.jpeg', photoPos: 'center 20%' },
                { id: 2, name: 'Rishabh', color: '#00A19B', photo: 'photos/rishabh.jpeg', photoPos: 'center 15%' },
                { id: 3, name: 'Adesh', color: '#7B2CBF', photo: 'photos/adesh.jpeg', photoPos: 'center 22%' }
            ],
            scores: {
                0: new Array(TRACK_COUNT).fill(0),
                1: new Array(TRACK_COUNT).fill(0),
                2: new Array(TRACK_COUNT).fill(0),
                3: new Array(TRACK_COUNT).fill(0)
            },
            selections: {
                0: Array.from({ length: TRACK_COUNT }, () => ({})),
                1: Array.from({ length: TRACK_COUNT }, () => ({})),
                2: Array.from({ length: TRACK_COUNT }, () => ({})),
                3: Array.from({ length: TRACK_COUNT }, () => ({}))
            }
        };

        let syncManager;
        let isApplyingRemote = false;
        let pieSvg, pieGenerator, arcGenerator;
        let lineSvg, xScale, yScale, lineGenerator, xAxisGroup, yAxisGroup;

        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function setSyncStatus(mode) {
            const dot = document.getElementById('sync-dot');
            const label = document.getElementById('sync-label');
            const styles = {
                cloud: { color: 'bg-green-500', text: 'Live sync' },
                local: { color: 'bg-yellow-500', text: 'This device only' }
            };
            const s = styles[mode] || styles.local;
            dot.className = `inline-block w-2 h-2 rounded-full ${s.color} mr-1`;
            label.textContent = s.text;
        }

        function avatarImg(manager, sizeClass = 'w-14 h-14') {
            const pos = manager.photoPos || 'center 22%';
            return `<img src="${manager.photo}" alt="${manager.name}" class="player-avatar ${sizeClass}" style="object-position:${pos};border:3px solid ${manager.color}">`;
        }

        function ensureManagerSlots(state) {
            window.f1State.managers.forEach(m => {
                if (!state.scores[m.id] && !state.scores[String(m.id)]) {
                    state.scores[m.id] = new Array(TRACK_COUNT).fill(0);
                }
                if (!state.selections[m.id] && !state.selections[String(m.id)]) {
                    state.selections[m.id] = Array.from({ length: TRACK_COUNT }, () => ({}));
                }
            });
        }

        function applyState(data) {
            if (!data) return;
            ensureManagerSlots(data);
            window.f1State.scores = data.scores;
            window.f1State.selections = data.selections;
            syncDOMWithState();
            updateDashboard();
        }

        function syncDOMWithState() {
            document.querySelectorAll('.driver-select').forEach(select => {
                const mId = select.dataset.manager;
                const tIdx = select.dataset.track;
                const catId = select.dataset.category;
                const savedVal = window.f1State.selections[mId]?.[tIdx]?.[catId];
                if (savedVal !== undefined && select.value !== savedVal) {
                    select.value = savedVal;
                }
            });

            document.querySelectorAll('.score-input').forEach(input => {
                const mId = input.dataset.manager;
                const tIdx = input.dataset.track;
                const catId = input.dataset.category;
                const savedVal = window.f1State.selections[mId]?.[tIdx]?.[catId];
                if (savedVal !== undefined && input.value !== String(savedVal)) {
                    input.value = savedVal;
                }
            });

            window.f1State.managers.forEach(m => {
                const scores = window.f1State.scores[m.id] || [];
                const grandTotal = scores.reduce((a, b) => a + b, 0);
                const el = document.getElementById(`total-${m.id}`);
                if (el) el.innerText = grandTotal;
            });
        }

        function triggerSave() {
            if (isApplyingRemote) return;
            syncManager.save({
                scores: window.f1State.scores,
                selections: window.f1State.selections
            });
        }

        function createManagerCard(manager) {
            const trackHeaders = window.f1State.tracks.map(t =>
                `<div class="text-center" title="${t} Grand Prix">${t}</div>`
            ).join('');

            const predictionsHtml = window.f1State.predictions.map(cat => {
                const options = window.f1State.drivers.map(d => `<option value="${d}">${d}</option>`).join('');
                return `
                <div class="driver-row grid gap-2 items-center bg-gray-900 p-2 rounded border-l-4 border-transparent hover:border-gray-500 transition-all duration-200 w-max" style="grid-template-columns: 140px repeat(${window.f1State.tracks.length}, 100px);">
                    <div class="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wide">${cat.name}</div>
                    ${window.f1State.tracks.map((t, tIndex) => `
                        <div>
                            <select data-manager="${manager.id}" data-track="${tIndex}" data-category="${cat.id}" class="driver-select w-full bg-asphalt text-white text-xs px-1 py-1.5 rounded border border-gray-700 focus:border-white focus:outline-none cursor-pointer">
                                <option value="" disabled selected>Select...</option>
                                ${options}
                            </select>
                        </div>
                    `).join('')}
                </div>`;
            }).join('');

            const fantasyHtml = window.f1State.fantasy.map(cat => {
                const options = cat.type === 'driver'
                    ? window.f1State.drivers.map(d => `<option value="${d}">${d}</option>`).join('')
                    : window.f1State.teams.map(t => `<option value="${t}">${t}</option>`).join('');

                return `
                <div class="driver-row grid gap-2 items-center bg-gray-900 p-2 rounded border-l-4 border-transparent transition-all duration-200 w-max" style="grid-template-columns: 140px repeat(${window.f1State.tracks.length}, 160px);">
                    <div class="text-xs md:text-sm font-bold text-gray-400 uppercase tracking-wide">${cat.name}</div>
                    ${window.f1State.tracks.map((t, tIndex) => `
                        <div class="flex gap-1">
                            <select data-manager="${manager.id}" data-track="${tIndex}" data-category="${cat.id}" class="driver-select w-2/3 bg-asphalt text-white text-xs px-1 py-1.5 rounded border border-gray-700 focus:border-white focus:outline-none cursor-pointer">
                                <option value="" disabled selected>Pick</option>
                                ${options}
                            </select>
                            <input type="number" min="0" placeholder="Pts" class="score-input w-1/3 bg-carbon text-center text-white text-xs px-1 py-1.5 rounded border border-gray-600 focus:outline-none transition-colors" data-manager="${manager.id}" data-track="${tIndex}" data-category="${cat.id}-pts">
                        </div>
                    `).join('')}
                </div>`;
            }).join('');

            return `
                <div class="bg-carbon rounded-xl overflow-hidden shadow-2xl border border-gray-800 flex flex-col manager-card" data-manager="${manager.id}">
                    <div class="p-4 flex justify-between items-center" style="background: linear-gradient(135deg, ${manager.color} 0%, #15151E 150%);">
                        <div class="flex items-center gap-4">
                            ${avatarImg(manager, 'w-16 h-16')}
                            <div>
                                <h3 class="text-2xl md:text-3xl font-racing text-white uppercase tracking-wider">${manager.name}</h3>
                                <p class="text-gray-200 text-xs font-semibold tracking-wider mt-1 opacity-80">GARAGE</p>
                            </div>
                        </div>
                        <div class="text-right fantasy-total-display hidden">
                            <span class="text-xs text-gray-300 font-bold uppercase tracking-widest mr-2">Total Points</span>
                            <span class="text-3xl font-racing text-white" id="total-${manager.id}">0</span>
                        </div>
                    </div>
                    <div class="p-4 flex-1 overflow-x-auto relative pb-6">
                        <div class="tab-content section-predictions active">
                            <div class="grid gap-2 px-2 pb-2 border-b border-gray-700 text-xs font-bold text-gray-500 uppercase w-max" style="grid-template-columns: 140px repeat(${window.f1State.tracks.length}, 100px);">
                                <div>Podium Pick</div>${trackHeaders}
                            </div>
                            <div class="space-y-2 mt-3 w-max">${predictionsHtml}</div>
                        </div>
                        <div class="tab-content section-fantasy">
                            <div class="grid gap-2 px-2 pb-2 border-b border-gray-700 text-xs font-bold text-gray-500 uppercase w-max" style="grid-template-columns: 140px repeat(${window.f1State.tracks.length}, 160px);">
                                <div>Fantasy Roster</div>${trackHeaders}
                            </div>
                            <div class="space-y-2 mt-3 w-max">${fantasyHtml}</div>
                        </div>
                    </div>
                </div>`;
        }

        function renderCards() {
            const container = document.getElementById('league-container');
            container.innerHTML = '';
            window.f1State.managers.forEach(manager => {
                container.innerHTML += createManagerCard(manager);
            });

            document.querySelectorAll('.driver-select').forEach(el => {
                el.addEventListener('change', handleSelectionChange);
            });
            document.querySelectorAll('.score-input').forEach(el => {
                el.addEventListener('input', handleScoreChange);
            });

            syncDOMWithState();
        }

        function handleSelectionChange(e) {
            const select = e.target;
            const mId = parseInt(select.dataset.manager);
            const tIdx = parseInt(select.dataset.track);
            const catId = select.dataset.category;

            if (!window.f1State.selections[mId]) window.f1State.selections[mId] = [];
            if (!window.f1State.selections[mId][tIdx]) window.f1State.selections[mId][tIdx] = {};
            window.f1State.selections[mId][tIdx][catId] = select.value;
            triggerSave();
        }

        function handleScoreChange(e) {
            const input = e.target;
            const managerId = parseInt(input.dataset.manager);
            const trackIndex = parseInt(input.dataset.track);
            const catId = input.dataset.category;

            if (!window.f1State.selections[managerId]) window.f1State.selections[managerId] = [];
            if (!window.f1State.selections[managerId][trackIndex]) window.f1State.selections[managerId][trackIndex] = {};
            window.f1State.selections[managerId][trackIndex][catId] = input.value;

            const trackInputs = document.querySelectorAll(`.score-input[data-manager="${managerId}"][data-track="${trackIndex}"]`);
            let trackTotal = 0;
            trackInputs.forEach(inp => {
                const val = parseInt(inp.value, 10);
                if (!isNaN(val)) trackTotal += val;
            });

            window.f1State.scores[managerId][trackIndex] = trackTotal;
            const grandTotal = window.f1State.scores[managerId].reduce((a, b) => a + b, 0);
            const totalEl = document.getElementById(`total-${managerId}`);
            if (totalEl) totalEl.innerText = grandTotal;

            updateDashboard();
            triggerSave();
        }

        function switchGlobalTab(tabName) {
            document.getElementById('btn-tab-predictions').classList.toggle('active', tabName === 'predictions');
            document.getElementById('btn-tab-fantasy').classList.toggle('active', tabName === 'fantasy');
            document.querySelectorAll('.section-predictions').forEach(el => {
                tabName === 'predictions' ? el.classList.add('active') : el.classList.remove('active');
            });
            document.querySelectorAll('.section-fantasy').forEach(el => {
                tabName === 'fantasy' ? el.classList.add('active') : el.classList.remove('active');
            });
            document.querySelectorAll('.fantasy-total-display').forEach(el => {
                tabName === 'fantasy' ? el.classList.remove('hidden') : el.classList.add('hidden');
            });
        }

        function getManagerTotals() {
            return window.f1State.managers.map(m => ({
                ...m,
                total: (window.f1State.scores[m.id] || []).reduce((a, b) => a + b, 0)
            }));
        }

        function updateDashboard() {
            const totals = getManagerTotals();
            const sortedManagers = [...totals].sort((a, b) => b.total - a.total);
            document.getElementById('leaderboard-container').innerHTML = sortedManagers.map((m, i) => {
                let rankColor = 'text-gray-500';
                let borderStyle = 'border-gray-700';
                if (i === 0 && m.total > 0) { rankColor = 'text-gold'; borderStyle = 'border-gold'; }
                else if (i === 1 && m.total > 0) { rankColor = 'text-silver'; borderStyle = 'border-silver'; }
                else if (i === 2 && m.total > 0) { rankColor = 'text-bronze'; borderStyle = 'border-bronze'; }
                return `
                    <div class="flex justify-between items-center bg-gray-900 p-3 rounded-lg border-l-4 ${borderStyle}">
                        <div class="flex items-center gap-3">
                            <span class="text-xl font-racing ${rankColor} w-8">P${i + 1}</span>
                            ${avatarImg(m, 'w-11 h-11')}
                            <span class="font-bold text-lg uppercase">${m.name}</span>
                        </div>
                        <div><span class="font-racing text-2xl">${m.total}</span><span class="text-xs text-gray-500 ml-1">PTS</span></div>
                    </div>`;
            }).join('');
            updateDonutChart(totals);
            updateLineChart();
        }

        function initDonutChart() {
            const width = 200, height = 200, margin = 10;
            const radius = Math.min(width, height) / 2 - margin;
            d3.select("#pie-chart-container").selectAll("*").remove();
            pieSvg = d3.select("#pie-chart-container").append("svg").attr("width", width).attr("height", height)
                .append("g").attr("transform", `translate(${width / 2},${height / 2})`);
            pieGenerator = d3.pie().value(d => d.total).sort(null);
            arcGenerator = d3.arc().innerRadius(radius * 0.6).outerRadius(radius);
            pieSvg.append("text").attr("text-anchor", "middle").attr("dy", "0.3em").attr("class", "fill-gray-500").style("font-size", "20px").text("VS");
        }

        function updateDonutChart(totals) {
            if (!pieSvg) return;
            const totalPoints = totals.reduce((sum, m) => sum + m.total, 0);
            const chartData = totalPoints === 0 ? totals.map(m => ({ ...m, total: 1 })) : totals;
            const paths = pieSvg.selectAll("path").data(pieGenerator(chartData));
            paths.enter().append("path").attr("stroke", "#1F1F27").attr("stroke-width", "3px")
                .on("mouseover", (event, d) => {
                    d3.select("#chart-tooltip").transition().duration(200).style("opacity", .9)
                        .html(`<strong>${d.data.name}</strong><br/>${totalPoints === 0 ? 0 : d.data.total} pts`)
                        .style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", () => d3.select("#chart-tooltip").transition().duration(500).style("opacity", 0))
                .merge(paths).transition().duration(750)
                .attrTween("d", function(d) {
                    this._current = this._current || d;
                    const interpolate = d3.interpolate(this._current, d);
                    this._current = interpolate(0);
                    return t => arcGenerator(interpolate(t));
                })
                .attr("fill", d => totalPoints === 0 ? '#272730' : d.data.color);
            paths.exit().remove();
        }

        function initLineChart() {
            const container = document.getElementById('line-chart-container');
            const width = container.clientWidth, height = 220;
            const margin = { top: 20, right: 30, bottom: 30, left: 40 };
            d3.select("#line-chart-container").selectAll("*").remove();
            lineSvg = d3.select("#line-chart-container").append("svg").attr("width", width).attr("height", height)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;
            xScale = d3.scalePoint().domain(window.f1State.tracks).range([0, innerWidth]).padding(0.1);
            yScale = d3.scaleLinear().domain([0, 100]).range([innerHeight, 0]);
            xAxisGroup = lineSvg.append("g").attr("transform", `translate(0,${innerHeight})`).call(d3.axisBottom(xScale).tickSizeOuter(0));
            xAxisGroup.selectAll("path, line").attr("stroke", "#374151");
            yAxisGroup = lineSvg.append("g").call(d3.axisLeft(yScale).ticks(5).tickSize(-innerWidth));
            yAxisGroup.selectAll("path").attr("stroke", "#374151");
            yAxisGroup.selectAll("line").attr("stroke", "#374151").attr("stroke-dasharray", "2,2").attr("opacity", 0.5);
            lineGenerator = d3.line().x(d => xScale(d.track)).y(d => yScale(d.points)).curve(d3.curveMonotoneX);
        }

        function updateLineChart() {
            if (!lineSvg) return;
            const lineData = window.f1State.managers.map(m => {
                let cumulative = 0;
                const values = window.f1State.tracks.map((track, idx) => {
                    cumulative += window.f1State.scores[m.id][idx] || 0;
                    return { track, points: cumulative, managerName: m.name };
                });
                return { id: m.id, name: m.name, color: m.color, values };
            });
            const maxPoints = d3.max(lineData, m => d3.max(m.values, d => d.points));
            const yMax = maxPoints > 0 ? maxPoints * 1.1 : 50;
            yScale.domain([0, yMax]);
            yAxisGroup.transition().duration(750).call(d3.axisLeft(yScale).ticks(5).tickSize(-(xScale.range()[1])));
            yAxisGroup.selectAll("path").attr("stroke", "#374151");
            yAxisGroup.selectAll("line").attr("stroke", "#374151").attr("stroke-dasharray", "2,2").attr("opacity", 0.5);
            const lines = lineSvg.selectAll(".line-path").data(lineData);
            lines.enter().append("path").attr("class", "line-path").attr("fill", "none").attr("stroke-width", 3)
                .attr("stroke", d => d.color).attr("d", d => lineGenerator(d.values))
                .merge(lines).transition().duration(750).attr("d", d => lineGenerator(d.values));
            const dotsGroup = lineSvg.selectAll(".dots-group").data(lineData);
            const dotsGroupEnter = dotsGroup.enter().append("g").attr("class", "dots-group").merge(dotsGroup);
            const dots = dotsGroupEnter.selectAll("circle").data(d => d.values);
            dots.enter().append("circle").attr("r", 4)
                .attr("fill", function() { return d3.select(this.parentNode).datum().color; })
                .attr("stroke", "#1F1F27").attr("stroke-width", 2)
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("r", 6);
                    d3.select("#chart-tooltip").transition().duration(200).style("opacity", .9)
                        .html(`<strong>${d.managerName}</strong><br/>${d.track}: ${d.points} pts`)
                        .style("left", (event.pageX + 10) + "px").style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function() {
                    d3.select(this).attr("r", 4);
                    d3.select("#chart-tooltip").transition().duration(500).style("opacity", 0);
                })
                .merge(dots).transition().duration(750)
                .attr("cx", d => xScale(d.track)).attr("cy", d => yScale(d.points));
        }

        async function boot() {
            syncManager = createSyncManager(window.APP_CONFIG || {}, MANAGER_COUNT, TRACK_COUNT);

            try {
                const mode = await syncManager.init();
                setSyncStatus(mode);

                syncManager.subscribe((remote) => {
                    isApplyingRemote = true;
                    applyState(remote);
                    isApplyingRemote = false;
                });

                const saved = await syncManager.load();
                if (saved) applyState(saved);

                if (!saved && mode === 'cloud') {
                    await syncManager.persist({
                        scores: window.f1State.scores,
                        selections: window.f1State.selections
                    });
                }
            } catch (err) {
                console.error("Sync init failed, using local mode:", err);
                setSyncStatus('local');
            }

            renderCards();
            initDonutChart();
            initLineChart();
            switchGlobalTab('predictions');
            updateDashboard();
            hideLoading();
        }

        document.getElementById('btn-tab-predictions').addEventListener('click', () => switchGlobalTab('predictions'));
        document.getElementById('btn-tab-fantasy').addEventListener('click', () => switchGlobalTab('fantasy'));
        window.addEventListener('resize', () => { initLineChart(); updateLineChart(); });
        boot();
    </script>
</body>
</html>
